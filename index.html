<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المساعد الذكي لدمج الحيوانات</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.cell{
background:#1e293b;
height:80px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
user-select:none;
cursor:pointer;
}

button{
margin:6px;
padding:10px 16px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.green{background:#22c55e}

#result{
margin-top:10px;
font-size:17px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td,th{
border:1px solid #334155;
padding:6px;
}

</style>
</head>

<body>

<div class="container">

<h2>🧠 مساعد دمج الحيوانات</h2>

<div class="grid" id="grid"></div>

<div>
<button class="green" onclick="analyzeAI()">تحليل AI</button>
<button class="green" onclick="clearBoard()">مسح</button>
</div>

<div id="result"></div>

<table id="table"></table>

</div>

<script>

let board=new Array(16).fill(0)
let lastMove=null

let animals=[
"",
"🐪","🦅","🐆","🦁","🐺",
"🐲","🐉","🦄","🐯","🐻","🐼"
]

function draw(){

let g=document.getElementById("grid")
g.innerHTML=""

for(let i=0;i<16;i++){

let d=document.createElement("div")
d.className="cell"

let v=board[i]

if(v>0){
let icon=animals[v] || "⭐"
d.innerText=icon+" "+v
}

let timer=null

d.onclick=()=>{
board[i]++
if(board[i]>11) board[i]=11
draw()
}

d.addEventListener("mousedown",()=>{
timer=setTimeout(()=>{
board[i]=0
draw()
},800)
})

d.addEventListener("mouseup",()=>clearTimeout(timer))

d.addEventListener("touchstart",()=>{
timer=setTimeout(()=>{
board[i]=0
draw()
},800)
})

d.addEventListener("touchend",()=>clearTimeout(timer))

g.appendChild(d)

}

}

function clearBoard(){
board=new Array(16).fill(0)
lastMove=null
draw()
}

function slide(row){

row=row.filter(x=>x)

for(let i=0;i<row.length-1;i++){

if(row[i]==row[i+1]){

row[i]++
row.splice(i+1,1)

}

}

while(row.length<4) row.push(0)

return row

}

function moveLeft(){

for(let r=0;r<4;r++){

let row=board.slice(r*4,r*4+4)
row=slide(row)

for(let c=0;c<4;c++)
board[r*4+c]=row[c]

}

}

function moveRight(){

for(let r=0;r<4;r++){

let row=board.slice(r*4,r*4+4).reverse()
row=slide(row)
row.reverse()

for(let c=0;c<4;c++)
board[r*4+c]=row[c]

}

}

function moveUp(){

for(let c=0;c<4;c++){

let col=[board[c],board[c+4],board[c+8],board[c+12]]
col=slide(col)

for(let r=0;r<4;r++)
board[r*4+c]=col[r]

}

}

function moveDown(){

for(let c=0;c<4;c++){

let col=[board[c],board[c+4],board[c+8],board[c+12]].reverse()
col=slide(col)
col.reverse()

for(let r=0;r<4;r++)
board[r*4+c]=col[r]

}

}

function simulate(b,dir){

let save=[...board]
board=[...b]

if(dir=="left") moveLeft()
if(dir=="right") moveRight()
if(dir=="up") moveUp()
if(dir=="down") moveDown()

let result=[...board]

board=save

return result

}

function evaluate(b){

let empty=b.filter(x=>x==0).length
let max=Math.max(...b)

let merges=0

for(let i=0;i<16;i++){

if(i%4!=3 && b[i]==b[i+1]) merges++
if(i<12 && b[i]==b[i+4]) merges++

}

let corners=[b[0],b[3],b[12],b[15]]
let corner=corners.includes(max)?200:0

return empty*150 + merges*120 + corner + max*15

}

function think(b,depth){

if(depth==0) return evaluate(b)

let dirs=["left","right","up","down"]
let best=-999999

for(let d of dirs){

let nb=simulate(b,d)

if(nb.toString()==b.toString()) continue

let score=think(nb,depth-1)

if(score>best) best=score

}

return best

}

function analyzeAI(){

/* اذا كان هناك حركة محفوظة → نفذها */

if(lastMove){

if(lastMove=="left") moveLeft()
if(lastMove=="right") moveRight()
if(lastMove=="up") moveUp()
if(lastMove=="down") moveDown()

draw()

document.getElementById("result").innerHTML="تم تنفيذ الحركة"

lastMove=null

return

}

/* تحليل جديد */

let dirs=["left","right","up","down"]

let bestMove=null
let bestScore=-999999

for(let d of dirs){

let nb=simulate(board,d)

if(nb.toString()==board.toString()) continue

let s=think(nb,8)

if(s>bestScore){

bestScore=s
bestMove=d

}

}

lastMove=bestMove

let arrow={
left:"⬅️",
right:"➡️",
up:"⬆️",
down:"⬇️"
}

let empty=board.filter(x=>x==0).length
let max=Math.max(...board)

document.getElementById("result").innerHTML=

"أفضل اتجاه: "+(bestMove?arrow[bestMove]:"لا يوجد")+"<br>"+
"اضغط تحليل AI مرة أخرى لتنفيذ الحركة<br>"+
"المربعات الفارغة: "+empty+"<br>"+
"أعلى مستوى: "+max

suggest()

}

function suggest(){

let counts={}

for(let v of board){

if(v>0){

counts[v]=(counts[v]||0)+1

}

}

let worst=null
let min=999

for(let k in counts){

if(counts[k]==1 && k<min){

min=k
worst=k

}

}

let table=document.getElementById("table")

table.innerHTML=""

if(worst){

table.innerHTML=
"<tr><th>اقتراح</th></tr>"+
"<tr><td>احذف المستوى "+worst+" لأنه يعرقل الدمج</td></tr>"

}else{

table.innerHTML=
"<tr><th>الوضع جيد</th></tr>"+
"<tr><td>لا حاجة للحذف حاليا</td></tr>"

}

}

draw()

</script>

</body>
</html>
