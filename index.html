<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مساعد دمج الحيوانات الذكي</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:10px;
}

h2{
font-size:clamp(18px,4vw,28px);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;

width:90vw;
max-width:420px;

margin:auto;
margin-top:20px;
}

.cell{
aspect-ratio:1;

background:#1e293b;

display:flex;
align-items:center;
justify-content:center;

font-size:clamp(18px,5vw,28px);

border-radius:14px;
cursor:pointer;
}

button{

margin:6px;
padding:10px 18px;

border:none;
border-radius:12px;

font-size:clamp(12px,3vw,16px);

cursor:pointer;

background:#22c55e;
color:white;
}

.mode{
background:#3b82f6;
}

.move{
background:#f59e0b;
}

.result{

margin-top:20px;
font-size:clamp(14px,3vw,18px);
line-height:1.8;

max-width:500px;
margin-left:auto;
margin-right:auto;

}

</style>
</head>

<body>

<h2>🤖 مساعد لعبة دمج الحيوانات</h2>

<div class="grid" id="grid"></div>

<br>

<button onclick="analyze()">🧠 تحليل</button>
<button onclick="clearBoard()">🧹 مسح اللوحة</button>

<br>

<button class="mode" onclick="setMode(0)">أرقام</button>
<button class="mode" onclick="setMode(1)">حيوانات</button>
<button class="mode" onclick="setMode(2)">حيوانات + رقم</button>

<br><br>

<button class="move" onclick="move('up')">⬆️</button>
<br>
<button class="move" onclick="move('left')">⬅️</button>
<button class="move" onclick="move('right')">➡️</button>
<br>
<button class="move" onclick="move('down')">⬇️</button>

<div class="result" id="result"></div>

<script>

let animals=[
"",
"🐪",
"🦅",
"🐆",
"🦁",
"🐺",
"🐉",
"🐎",
"🦬",
"🐘",
"🐲",
"🦍"
]

let mode=0
let grid=document.getElementById("grid")
let cells=[]

for(let i=0;i<16;i++){

let div=document.createElement("div")
div.className="cell"
div.dataset.value=0

div.onclick=()=>{

let v=Number(div.dataset.value)

v++
if(v>11) v=1

div.dataset.value=v
drawCell(div)

}

let timer

div.onmousedown=()=>{

timer=setTimeout(()=>{

div.dataset.value=0
div.innerText=""

},600)

}

div.onmouseup=()=>clearTimeout(timer)
div.onmouseleave=()=>clearTimeout(timer)

grid.appendChild(div)
cells.push(div)

}

function drawCell(cell){

let v=Number(cell.dataset.value)

if(v==0){
cell.innerText=""
return
}

if(mode==0) cell.innerText=v
if(mode==1) cell.innerText=animals[v]
if(mode==2) cell.innerText=animals[v]+" "+v

}

function setMode(m){

mode=m
cells.forEach(drawCell)

}

function clearBoard(){

cells.forEach(c=>{
c.dataset.value=0
c.innerText=""
})

}

function slide(row){

row=row.filter(v=>v)

for(let i=0;i<row.length-1;i++){

if(row[i]==row[i+1]){

row[i]++
row.splice(i+1,1)

}

}

while(row.length<4) row.push(0)

return row

}

function move(dir){

let board=cells.map(c=>Number(c.dataset.value))
let newBoard=[...board]

if(dir=="left"){

for(let r=0;r<4;r++){

let row=board.slice(r*4,r*4+4)
row=slide(row)

for(let c=0;c<4;c++)
newBoard[r*4+c]=row[c]

}

}

if(dir=="right"){

for(let r=0;r<4;r++){

let row=board.slice(r*4,r*4+4).reverse()
row=slide(row)
row=row.reverse()

for(let c=0;c<4;c++)
newBoard[r*4+c]=row[c]

}

}

if(dir=="up"){

for(let c=0;c<4;c++){

let col=[board[c],board[c+4],board[c+8],board[c+12]]
col=slide(col)

for(let r=0;r<4;r++)
newBoard[r*4+c]=col[r]

}

}

if(dir=="down"){

for(let c=0;c<4;c++){

let col=[board[c],board[c+4],board[c+8],board[c+12]].reverse()
col=slide(col)
col=col.reverse()

for(let r=0;r<4;r++)
newBoard[r*4+c]=col[r]

}

}

for(let i=0;i<16;i++){

cells[i].dataset.value=newBoard[i]
drawCell(cells[i])

}

}

function analyze(){

let board=cells.map(c=>Number(c.dataset.value))

let empty=board.filter(v=>v==0).length
let max=Math.max(...board)

let merges=0

for(let i=0;i<16;i++){

if(i%4!=3 && board[i]!=0 && board[i]==board[i+1]) merges++
if(i<12 && board[i]!=0 && board[i]==board[i+4]) merges++

}

let danger="🟢 آمن"
if(empty<4) danger="🟡 متوسط"
if(empty<2) danger="🔴 خطر"

let bestMove="⬅️"
if(merges==0 && empty<2) bestMove="⬆️"

let tools=""

if(empty==0){

tools+="⚠ اللوحة ممتلئة<br>"
tools+="🧹 استخدم مسح مربع مستوى منخفض<br>"
tools+="🔄 استخدم خلط اللوحة<br>"

}

else if(empty<=2){

tools+="⚠ اللوحة شبه ممتلئة<br>"
tools+="💎 استخدم البلورة لدمج حيوانين قويين<br>"

}

document.getElementById("result").innerHTML=

`
مربعات فارغة: ${empty}<br>
دمج ممكن: ${merges}<br>
أعلى مستوى: ${max}<br>
الحالة: ${danger}<br><br>

أفضل حركة: ${bestMove}<br><br>

${tools}
`

}

/* السحب بالإصبع */

let startX=0
let startY=0

grid.addEventListener("touchstart",(e)=>{

startX=e.touches[0].clientX
startY=e.touches[0].clientY

})

grid.addEventListener("touchend",(e)=>{

let dx=e.changedTouches[0].clientX-startX
let dy=e.changedTouches[0].clientY-startY

if(Math.abs(dx)>Math.abs(dy)){

if(dx>30) move("right")
if(dx<-30) move("left")

}else{

if(dy>30) move("down")
if(dy<-30) move("up")

}

})

</script>

</body>
  </html>
